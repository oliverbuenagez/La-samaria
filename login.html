<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA SAMARIA — Login Admin</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body class="login-page">
  <main class="login-card">
    <div class="login-card__brand">
      <img src="assets/img/logo.png" alt="LA SAMARIA" class="login-card__logo" />
      <h1>LA SAMARIA</h1>
      <p>Acceso al panel de pedidos</p>
    </div>

    <form id="login-form" class="login-form">
      <label for="login-email">Correo</label>
      <input id="login-email" type="email" autocomplete="email" required />

      <label for="login-password">Contraseña</label>
      <input id="login-password" type="password" autocomplete="current-password" required />

      <p id="login-error" class="login-error" role="alert"></p>
      <button id="login-submit" type="submit" class="login-button">Entrar al panel</button>
    </form>
  </main>

  <script src="assets/js/login.js"></script>
</body>
</html>
